<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kora Teh Explorer's Blog</title>

    <!-- Tailwind CSS with Typography Plugin for beautiful Markdown rendering -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <!-- Marked.js for parsing Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify to safely render HTML -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>

    <style>
        /* Smooth scrolling and basic clean ups */
        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-10 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight cursor-pointer hover:text-blue-600 transition-colors" onclick="window.location.hash=''">
                    Kora Teh Explorer
                </h1>
                <p class="text-sm text-gray-500 mt-1"><a href="https://github.com/forzabarca88/kora-teh-explorer" target="_blank" class="text-blue-500 hover:text-blue-700">View on GitHub</a></p>
            </div>
            <nav>
                <a href="#" onclick="window.location.hash=''" class="text-gray-500 hover:text-gray-900 font-medium">Home</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl mx-auto px-4 py-12 sm:px-6 lg:px-8 w-full">
        <div id="app">
            <!-- Dynamic content injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-auto">
        <div class="max-w-4xl mx-auto px-4 py-8 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
            &copy; <span id="year"></span> Kora Teh Explorer. Powered by GitHub Pages.
        </div>
    </footer>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const CONFIG = {
            owner: 'forzabarca88', // e.g. 'octocat'
            repo: 'kora-teh-explorer',      // e.g. 'my-blog'
            postsDir: 'posts'              // The directory containing your .md files
        };

        // Auto-detect GitHub username and repo if hosted on Github Pages and config is left as default
        const isGithubPages = window.location.hostname.endsWith('.github.io');
        if (CONFIG.owner === 'YOUR_GITHUB_USERNAME' && isGithubPages) {
            CONFIG.owner = window.location.hostname.split('.')[0];
            const pathSegments = window.location.pathname.split('/').filter(Boolean);
            CONFIG.repo = pathSegments.length > 0 ? pathSegments[0] : `${CONFIG.owner}.github.io`;
        }

        // ==========================================
        // APPLICATION LOGIC
        // ==========================================
        const app = document.getElementById('app');
        document.getElementById('year').textContent = new Date().getFullYear();

        // Helper: Format filename to a readable title
        function formatTitle(filename) {
            return filename
                .replace(/\.md$/, '')
                .replace(/[-_]/g, ' ')
                .replace(/\b\w/g, char => char.toUpperCase());
        }

        // Helper: Get month/year key for grouping
        function getMonthKey(date) {
            return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
        }

        // Toggle month visibility
        function toggleMonth(id) {
            const content = document.getElementById(`month-${id}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                const arrow = document.getElementById(`arrow-${id}`);
                if (arrow) arrow.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>';
            } else {
                content.classList.add('hidden');
                const arrow = document.getElementById(`arrow-${id}`);
                if (arrow) arrow.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>';
            }
        }

        // Helper: Show Loading state
        function showLoading() {
            app.innerHTML = `
                <div class="flex justify-center items-center py-20">
                    <div class="spinner"></div>
                    <span class="ml-3 text-gray-500 font-medium">Loading...</span>
                </div>
            `;
        }

        // Fetch list of posts and their modify dates
        async function fetchPosts() {
            const contentsUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/docs/${CONFIG.postsDir}`;
            
            try {
                const response = await fetch(contentsUrl);
                if (!response.ok) throw new Error('Directory not found or API limit reached.');
                
                const files = await response.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));

                // Fetch commit dates for sorting (Cached via SHA to prevent rate-limit bans)
                const postsWithDates = await Promise.all(mdFiles.map(async file => {
                    const cacheKey = `mdate_${file.sha}`;
                    let dateStr = localStorage.getItem(cacheKey);

                    // If we don't have the date cached for this specific file version, fetch it
                    if (!dateStr) {
                        try {
                            const commitUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/commits?path=${file.path}&per_page=1`;
                            const commitRes = await fetch(commitUrl);
                            if (commitRes.ok) {
                                const commits = await commitRes.json();
                                if (commits.length > 0) {
                                    dateStr = commits[0].commit.committer.date;
                                    localStorage.setItem(cacheKey, dateStr);
                                }
                            }
                        } catch (e) {
                            console.warn('Could not fetch date for', file.name);
                        }
                    }

                    return {
                        ...file,
                        title: formatTitle(file.name),
                        date: dateStr ? new Date(dateStr) : new Date(0)
                    };
                }));

                // Sort purely by date descending
                return postsWithDates.sort((a, b) => b.date - a.date);

            } catch (error) {
                console.error(error);
                app.innerHTML = `
                    <div class="bg-red-50 text-red-700 p-6 rounded-lg border border-red-200">
                        <h2 class="text-lg font-bold mb-2">Configuration Required</h2>
                        <p>Unable to fetch posts. If you are viewing this locally or on a custom domain, please edit the <code>index.html</code> file and update the <code>CONFIG</code> object with your exact GitHub Username and Repository name.</p>
                        <p class="mt-2 text-sm opacity-80">Error details: ${error.message}</p>
                    </div>`;
                return null;
            }
        }

        // Render the list of posts
        async function renderList() {
            showLoading();
            const posts = await fetchPosts();
            
            if (!posts) return; // Error handled in fetchPosts

            if (posts.length === 0) {
                app.innerHTML = `
                    <div class="text-center py-20 text-gray-500">
                        <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p class="text-lg">No markdown files found in the <code>${CONFIG.postsDir}</code> directory.</p>
                    </div>`;
                return;
            }

            let html = '<div class="space-y-10">';
            
            // Group posts by month
            const groupedPosts = {};
            for (const post of posts) {
                const monthKey = getMonthKey(post.date);
                if (!groupedPosts[monthKey]) {
                    groupedPosts[monthKey] = { date: new Date(), posts: [] };
                }
                groupedPosts[monthKey].posts.push(post);
            }
            
            // Render each month group (descending order - newest first)
            const sortedMonthKeys = Object.keys(groupedPosts).sort().reverse();
            for (const monthKey of sortedMonthKeys) {
                const { date: monthDate, posts: monthPosts } = groupedPosts[monthKey];
                
                // Month section with toggle
                html += `
                    <div class="mb-8">
                        <button id="toggle-${monthKey}" onclick="toggleMonth('${monthKey}')" class="flex items-center justify-between w-full text-left group">
                            <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <span class="bg-blue-100 text-blue-700 text-sm font-medium px-3 py-1 rounded-full">${monthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</span>
                            </h3>
                            <span id="arrow-${monthKey}" class="transition-transform duration-200 text-gray-400 group-hover:text-blue-500">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </span>
                        </button>
                        <div id="month-${monthKey}" class="hidden pl-8 border-l-2 border-gray-100 ml-4">
                            <div class="space-y-4 mt-2">
                `;
                
                for (const post of monthPosts) {
                    const dateDisplay = post.date.getTime() > 0 
                        ? post.date.toLocaleDateString('en-US', { day: 'numeric' }) 
                        : 'Unknown Date';

                    html += `
                                <article class="group bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:border-blue-100 transition-all duration-200 transform hover:-translate-y-1">
                                    <a href="#post=${encodeURIComponent(post.name)}" class="block">
                                        <h2 class="text-xl font-bold text-gray-900 group-hover:text-blue-600 transition-colors mb-2">${post.title}</h2>
                                        <div class="flex items-center text-sm text-gray-500">
                                            <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                            <time>${dateDisplay}</time>
                                        </div>
                                    </a>
                                </article>
                            `;
                }
                html += `
                            </div>
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            app.innerHTML = html;
            return posts[0].name; // Return latest post name for auto-open
        }

        // Render a single post
        async function renderPost(fileName) {
            showLoading();
            
            // To be secure and exact, ask API for the file download URL directly
            const apiUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/docs/${CONFIG.postsDir}/${fileName}`;
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Post not found.');
                
                const data = await response.json();
                const rawRes = await fetch(data.download_url);
                const markdown = await rawRes.text();

                // Convert Markdown to HTML and sanitize
                const rawHtml = marked.parse(markdown);
                const safeHtml = DOMPurify.sanitize(rawHtml);

                app.innerHTML = `
                    <div class="mb-8">
                        <a href="#" class="inline-flex items-center text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            Back to all posts
                        </a>
                    </div>
                    <article class="prose prose-lg prose-blue max-w-none bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                        ${safeHtml}
                    </article>
                `;
            } catch (error) {
                app.innerHTML = `
                    <div class="text-center py-20">
                        <h2 class="text-2xl font-bold text-gray-900 mb-4">Post not found</h2>
                        <a href="#" class="text-blue-600 hover:underline">Return home</a>
                    </div>
                `;
            }
        }

        // Basic Hash Router
        async function router(latestPostName) {
            const hash = window.location.hash;
            if (hash.startsWith('#post=')) {
                const fileName = decodeURIComponent(hash.substring(6));
                await renderPost(fileName);
            } else if (latestPostName) {
                // Auto-open latest post if no specific post requested
                window.location.hash = `#post=${encodeURIComponent(latestPostName)}`;
            } else {
                await renderList();
            }
            window.scrollTo(0, 0);
        }

        // Event listeners
        window.addEventListener('hashchange', () => router());
        window.addEventListener('DOMContentLoaded', async () => {
            const latestPost = await renderList();
            router(latestPost);
        });
    </script>
</body>
</html>
